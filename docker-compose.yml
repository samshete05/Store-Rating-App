services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: store_ratings
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - store_ratings_data:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d

volumes:
  store_ratings_data:
